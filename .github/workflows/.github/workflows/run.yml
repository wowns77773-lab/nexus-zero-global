name: Daily Global Insight

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시(UTC 0시)에 자동 실행
  workflow_dispatch: # 우리가 직접 '실행' 버튼을 누를 수 있게 해주는 옵션

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests google-generativeai

      - name: Run Global Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Nexus-Zero-Bot"
          git config --global user.email "bot@nexus.zero"
          git add .
          git commit -m "Daily Update: $(date)" || echo "No changes to commit"
          git push
